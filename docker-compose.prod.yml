# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.9'

services:
  migrate:
    command: ["sh", "-c", "npx prisma migrate deploy"]

  backend:
    build:
      context: ./backend
      target: production
    environment:
      NODE_ENV: production

  frontend:
    build:
      context: ./frontend
      target: production
    # In production, frontend is built as static files served by nginx
    # Override command: nginx serves from /app/dist
    command: ["nginx", "-g", "daemon off;"]

  nginx:
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
