# Development overrides — applied automatically by docker compose
# Enables hot-reload by mounting source directories as volumes

version: '3.9'

services:
  migrate:
    command: ["sh", "-c", "npx prisma migrate dev --name init && npx ts-node prisma/seed.ts"]
    volumes:
      - ./backend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      target: builder
    command: ["npx", "ts-node-dev", "--respawn", "--transpile-only", "src/index.ts"]
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development

  frontend:
    build:
      context: ./frontend
      target: builder
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
