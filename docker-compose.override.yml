# Development overrides — applied automatically by docker compose
# Enables hot-reload by mounting source directories as volumes

version: '3.9'

services:
  migrate:
    command: ["sh", "-c", "npx prisma migrate deploy && npx ts-node prisma/seed.ts"]
    # No volume mounts — migrate runs from the built image so it uses the correct
    # Linux Prisma binaries (not the macOS host's node_modules)

  backend:
    build:
      context: ./backend
      target: builder
    command: ["npx", "ts-node-dev", "--respawn", "--transpile-only", "src/index.ts"]
    volumes:
      # Mount only source dirs — container keeps its own node_modules (correct Linux binaries)
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    environment:
      NODE_ENV: development

  frontend:
    build:
      context: ./frontend
      target: builder
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5173"]
    volumes:
      # Mount only source dirs — container keeps its own node_modules
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      NODE_ENV: development
