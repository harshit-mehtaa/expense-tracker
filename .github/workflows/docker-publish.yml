name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: harshit-mehtaa

jobs:
  mirror-base-images:
    name: Mirror base images to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror images
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.OWNER }}/postgres:16-alpine \
            postgres:16-alpine
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.OWNER }}/node:20-alpine \
            node:20-alpine
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.OWNER }}/nginx:alpine \
            nginx:alpine

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs: [mirror-base-images]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/expense-tracker-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: [mirror-base-images]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/expense-tracker-frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production-server
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  make-packages-public:
    name: Make packages public
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, mirror-base-images]
    # Requires a PAT with write:packages scope stored as PACKAGES_TOKEN secret.
    # GITHUB_TOKEN cannot change package visibility — add this secret to enable.
    permissions:
      packages: write

    steps:
      - name: Set all packages to public
        run: |
          for pkg in expense-tracker-backend expense-tracker-frontend postgres node nginx; do
            echo "Setting ${pkg} to public..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${{ secrets.PACKAGES_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d '{"visibility":"public"}' \
              "https://api.github.com/user/packages/container/${pkg}")
            echo " → HTTP ${STATUS}"
          done
