# ── Standalone deploy compose ──────────────────────────────────────────────────
# Uses pre-built images from GHCR. No repo clone needed.
#
# Usage:
#   1. Create .env from the template in DEPLOY.md
#   2. docker login ghcr.io -u <github-username> -p <github-token>
#   3. docker compose -f docker-compose.deploy.yml pull
#   4. docker compose -f docker-compose.deploy.yml up -d
# ──────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Migrations (one-shot) ───────────────────────────────────────────────────
  migrate:
    image: ghcr.io/harshit-mehtaa/expense-tracker-backend:latest
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/harshit-mehtaa/expense-tracker-backend:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads_data:/app/uploads

  # ── Frontend (nginx — serves static files + proxies /api/ to backend) ───────
  frontend:
    image: ghcr.io/harshit-mehtaa/expense-tracker-frontend:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
