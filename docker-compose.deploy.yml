# ── Standalone deploy compose ──────────────────────────────────────────────────
# Uses pre-built images from GHCR. No repo clone needed.
#
# Usage:
#   1. Copy .env.deploy.example → .env and fill in secrets
#   2. docker login ghcr.io -u <github-username> -p <github-token>
#   3. docker compose -f docker-compose.deploy.yml pull
#   4. docker compose -f docker-compose.deploy.yml up -d
#
# To update to a new release:
#   docker compose -f docker-compose.deploy.yml pull
#   docker compose -f docker-compose.deploy.yml up -d
# ──────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Migrations (one-shot, exits after applying pending migrations) ───────────
  migrate:
    image: ghcr.io/harshit-mehtaa/expense-tracker-backend:latest
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/harshit-mehtaa/expense-tracker-backend:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads_data:/app/uploads

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/harshit-mehtaa/expense-tracker-frontend:latest
    restart: unless-stopped

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf

configs:
  nginx_conf:
    content: |
      upstream backend {
          server backend:3000;
      }
      upstream frontend {
          server frontend:80;
      }
      server {
          listen 80;
          server_name localhost;
          client_max_body_size 20M;

          location /api/ {
              proxy_pass http://backend;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection 'upgrade';
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout 300s;
              proxy_connect_timeout 75s;
          }

          location / {
              proxy_pass http://frontend;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
          }
      }

volumes:
  postgres_data:
  uploads_data:
